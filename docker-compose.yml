version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: primesource-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://primesource:primesource_secret@db:5432/primesource?schema=public
      - NEXTAUTH_SECRET=docker-nextauth-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - primesource-network

  db:
    image: postgres:16-alpine
    container_name: primesource-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: primesource
      POSTGRES_PASSWORD: primesource_secret
      POSTGRES_DB: primesource
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U primesource']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - primesource-network

volumes:
  postgres_data:
    driver: local

networks:
  primesource-network:
    driver: bridge
